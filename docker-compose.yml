services:
  db:
    image: postgres:17
    container_name: meeet-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: meeet
      POSTGRES_PASSWORD: meeet_local_dev
      POSTGRES_DB: meeet
    ports:
      - "5434:5432"
    volumes:
      - meeet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeet -d meeet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  meeet_pgdata:
